<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idée Cadeau Insolite | AbracadaRoom</title>
  <meta name="description" content="Découvrez nos offres cadeaux pour offrir l'insolite : cartes cadeaux, bons cadeaux et coffrets pour des séjours uniques en cabane, bulle, yourte et bien plus.">

  <!-- Bootstrap 4.3.1 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

  <style>
    /* ===== VARIABLES & GLOBALS ===== */
    :root {
      --abcd-turquoise: #1babb5;
      --abcd-turquoise-dark: #148a93;
      --abcd-bordeaux: #7f204e;
      --abcd-bordeaux-dark: #5e1839;
      --abcd-text: #333333;
      --abcd-text-muted: #888888;
    }

    body {
      color: var(--abcd-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* ===== SHARED COMPONENTS ===== */
    .abcd-section-title {
      color: var(--abcd-bordeaux);
      font-size: 2rem;
    }

    .abcd-btn-turquoise {
      background-color: var(--abcd-turquoise);
      border-color: var(--abcd-turquoise);
      color: #fff;
      border-radius: 50px;
      padding: 12px 32px;
      font-weight: 600;
    }
    .abcd-btn-turquoise:hover {
      background-color: var(--abcd-turquoise-dark);
      border-color: var(--abcd-turquoise-dark);
      color: #fff;
    }

    .abcd-btn-bordeaux {
      background-color: var(--abcd-bordeaux);
      border-color: var(--abcd-bordeaux);
      color: #fff;
      border-radius: 50px;
      padding: 12px 32px;
      font-weight: 600;
    }
    .abcd-btn-bordeaux:hover {
      background-color: var(--abcd-bordeaux-dark);
      border-color: var(--abcd-bordeaux-dark);
      color: #fff;
    }

    /* ===== BLOC STYLES (added incrementally) ===== */

  </style>
</head>
<body>

  <!-- Blocs ajoutés incrémentalement ici -->

  <!-- jQuery + Popper + Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
